<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Write Poem 🖊️</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="logo">🌜 Crescent Moon Poems</div>

<div class="container">
    <h2>Write Your Beautiful Poem 💕</h2>

    <form action="/save" method="post">
        <input type="text" name="title" placeholder="📖 Poem Title" required>

        <textarea name="poem" rows="8" 
        placeholder="✨ Let your heart speak here..." required></textarea>

        <button type="submit">💖 Save Poem</button>
    </form>
</div>

</body>
</html>
